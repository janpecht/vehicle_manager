services:
  postgres:
    image: postgres:16-alpine
    container_name: sprinter-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sprinter
      POSTGRES_PASSWORD: sprinter_dev_password
      POSTGRES_DB: sprinter_damage_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprinter -d sprinter_damage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
