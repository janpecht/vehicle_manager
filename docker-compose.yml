services:
  postgres:
    image: postgres:16-alpine
    container_name: sprinter-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sprinter
      POSTGRES_PASSWORD: sprinter_dev_password
      POSTGRES_DB: vehicle_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprinter -d vehicle_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sprinter-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://sprinter:sprinter_dev_password@postgres:5432/vehicle_db?schema=public"
      JWT_ACCESS_SECRET: "dev-access-secret-change-in-production-min32chars"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-in-production-min32chars"
      ACCESS_TOKEN_EXPIRES_IN: "15m"
      REFRESH_TOKEN_EXPIRES_IN_DAYS: "7"
      BCRYPT_ROUNDS: "12"
      PORT: "3001"
      NODE_ENV: "development"
      CORS_ORIGIN: "http://localhost:5173"
      ALLOWED_EMAIL_DOMAIN: "dieeisfabrik.de"
      # SMTP config (optional - uncomment and configure for email notifications)
      # SMTP_HOST: "smtp.example.com"
      # SMTP_PORT: "587"
      # SMTP_SECURE: "false"
      # SMTP_USER: "user@example.com"
      # SMTP_PASS: "password"
      # SMTP_FROM: "noreply@example.com"
      # CHECKLIST_NOTIFY_EMAIL: "fleet@example.com"

  frontend:
    build: ./frontend
    container_name: sprinter-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
