services:
  postgres:
    image: postgres:16-alpine

    restart: unless-stopped
    # No external ports — only accessible within Docker network
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sprinter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vehicle_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sprinter} -d ${POSTGRES_DB:-vehicle_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    restart: unless-stopped
    # No external ports — nginx proxies to backend internally
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sprinter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vehicle_db}?schema=public"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required (min 32 chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required (min 32 chars)}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-7}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      PORT: "3001"
      NODE_ENV: "production"
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required (e.g. https://your-domain.com)}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:?ALLOWED_EMAIL_DOMAIN is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CHECKLIST_NOTIFY_EMAIL: ${CHECKLIST_NOTIFY_EMAIL:-}
      TRUST_PROXY: ${TRUST_PROXY:-2}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pgdata:
